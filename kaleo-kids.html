<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaleo Kids — K–5th grade performing arts | Kaleo Arts</title>
<meta name="description" content="Our flagship program for K-5th graders. Singing, dancing, acting, and community time in one class a week — leading to five live stage performances a year." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/kaleo.css" />
</head>
<body data-screen-label="Kaleo Kids">
<div id="lights-slot"></div>
<div id="nav-slot"></div>

<main id="app"></main>

<div id="footer-slot"></div>

<script>window.__page = 'kaleo-kids';</script>
<script src="assets/copy.js"></script>
<script src="assets/kaleo.js"></script>
<script src="assets/chrome.js"></script>
<script src="assets/partials.js"></script>
<script>
  const C = window.KALEO_COPY;
  const KP = window.KP;
  const K = C.kaleoKids;
  const app = document.getElementById('app');

  app.innerHTML = `
    <!-- HERO -->
    <section class="hero program-hero coral">
      <div class="spotlight"></div>
      <div class="container hero-inner">
        <span class="accent-line"></span>
        <div class="eyebrow reveal">${K.hero.eyebrow}</div>
        <h1 class="hero-title reveal r-d1">
          ${K.hero.headline.pre}<br/>
          <span class="italic">${K.hero.headline.italic}</span><br/>
          ${K.hero.headline.tail}
        </h1>
        <p class="hero-subhead reveal r-d2">${K.hero.subhead}</p>
        <div class="cta-row reveal r-d3">
          <a class="btn btn-primary" href="#lead">${K.hero.cta} ${KP.arrow()}</a>
          <a class="btn btn-secondary" href="#offer">See what's included</a>
        </div>
      </div>
    </section>

    <!-- Photo strip (placeholders) -->
    <div class="container">
      <div class="photo-strip">
        <div class="ph ph-photo reveal">
          <div class="ph-tag">PHOTO \u00b7 KIDS ON STAGE</div>
          <span>Real Kaleo Kids production shot goes here</span>
        </div>
        <div class="ph ph-video reveal r-d1">
          <div class="ph-tag">VIDEO \u00b7 CLASS HIGHLIGHT</div>
          <div class="ph-play">
            <svg width="20" height="20" viewBox="0 0 20 20"><path d="M6 4l10 6-10 6z" fill="currentColor"/></svg>
          </div>
        </div>
        <div class="ph ph-photo reveal r-d2">
          <div class="ph-tag">PHOTO \u00b7 REHEARSAL</div>
          <span>Behind-the-scenes rehearsal shot</span>
        </div>
      </div>
    </div>

    <!-- PULL QUOTE -->
    ${KP.pullquote(K.pullQuote)}

    <!-- STATS -->
    ${KP.statStrip(K.stats)}

    <!-- FOUR CLASSES IN ONE -->
    <section class="four-col-strip">
      <div class="container">
        <h2 class="fc-head reveal">${K.fourClasses.heading.pre} <em>${K.fourClasses.heading.italic}</em></h2>
        <p class="fc-sub reveal r-d1">${K.fourClasses.sub}</p>
        <div class="four-col-grid">
          ${K.fourClasses.items.map((it, i) => `
            <div class="four-col-item reveal r-d${(i%4)+1}">
              <div class="num">${['i', 'ii', 'iii', 'iv'][i]}</div>
              <h3>${it.title}</h3>
              <p>${it.body}</p>
            </div>
          `).join('')}
        </div>
        <p class="four-col-note reveal">
          ${K.fourClasses.note} <strong>${K.fourClasses.noteStrong}</strong> ${K.fourClasses.noteEnd}
        </p>
      </div>
    </section>

    <!-- FIVE TIMES TO SHINE -->
    <div class="container">
      <section class="two-col reveal">
        <h2>${K.fiveShine.heading.pre}<br/><span class="italic">${K.fiveShine.heading.italic}</span></h2>
        <div class="two-col-body">
          <p>${K.fiveShine.body}</p>
          <a class="btn btn-primary" href="#lead">${K.hero.cta} ${KP.arrow()}</a>
        </div>
      </section>
    </div>

    <!-- ENROLL OFFER -->
    <section id="offer" class="container">
      <div class="enroll-offer">
        <div class="reveal">
          <div class="price">${K.enroll.priceEye}</div>
          <div class="price-big">${K.enroll.priceBig}<span style="font-size:32px; color: rgba(244,233,210,.6);">${K.enroll.priceUnit}</span></div>
          <p class="price-note">${K.enroll.priceNote}</p>
          <h2>${K.enroll.heading.pre}<br/><em>${K.enroll.heading.italic}</em></h2>
        </div>
        <div class="reveal r-d1">
          <ul class="includes">
            ${K.enroll.includes.map(inc => `<li>${inc}</li>`).join('')}
          </ul>
          <a class="btn btn-primary" href="#lead" style="width:100%; justify-content:center;">${K.enroll.cta} ${KP.arrow()}</a>
        </div>
      </div>
    </section>

    <!-- FOUNDER STORY -->
    <div class="container">
      <section class="two-col reveal">
        <h2>${K.founderStory.heading.pre}<br/><span class="italic">${K.founderStory.heading.italic}</span></h2>
        <div class="two-col-body">
          ${K.founderStory.body.map(p => `<p>${p}</p>`).join('')}
          <a class="btn btn-secondary" href="about.html">Meet Renee ${KP.arrow()}</a>
        </div>
      </section>
    </div>

    <!-- TESTIMONIALS -->
    ${KP.testimonials(K.testimonials, { pre: 'What our', italic: 'families', tail: 'say.' })}

    <!-- LEAD FORM -->
    <section id="lead" class="lead-section container">
      <div class="reveal">
        <div class="ls-eye">\u2726 Start your trial</div>
        <h2>${K.leadForm.heading.pre}<br/><em>${K.leadForm.heading.italic}</em></h2>
        <p>${K.leadForm.sub}</p>
        ${KP.iClassEmbed('Kaleo Kids')}
      </div>
      <div class="reveal r-d1">
        ${KP.leadForm(K.leadForm)}
      </div>
    </section>

    <!-- FINAL -->
    ${KP.finalCta({
      eye: 'RSVP',
      heading: { pre: "You're", italic: 'invited.' },
      body: "Come see what an invitation feels like. No audition required. No obligation. Just a conversation and a look around.",
      primary: 'Enroll today',
      secondary: 'Schedule a tour',
    })}
  `;
  if (window.__observeReveal) window.__observeReveal();
</script>
</body>
</html>
