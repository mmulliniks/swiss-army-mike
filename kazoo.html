<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kazoo — Early childhood music & movement (Ages 3–6) | Kaleo Arts</title>
<meta name="description" content="A joyful, age-appropriate introduction to music, movement, and storytelling for kids ages 3–6. 30-minute classes; Open Play add-on available." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/kaleo.css" />
</head>
<body data-screen-label="Kazoo">
<div id="lights-slot"></div>
<div id="nav-slot"></div>

<main id="app"></main>

<div id="footer-slot"></div>

<script>window.__page = 'kazoo';</script>
<script src="assets/copy.js"></script>
<script src="assets/kaleo.js"></script>
<script src="assets/chrome.js"></script>
<script src="assets/partials.js"></script>
<script>
  const C = window.KALEO_COPY;
  const KP = window.KP;
  const K = C.kazoo;
  const app = document.getElementById('app');

  app.innerHTML = `
    <!-- HERO -->
    <section class="hero program-hero mint">
      <div class="spotlight"></div>
      <div class="container hero-inner">
        <span class="accent-line"></span>
        <div class="eyebrow reveal">${K.hero.eyebrow}</div>
        <h1 class="hero-title reveal r-d1">
          ${K.hero.headline.pre}<br/>
          <span class="italic">${K.hero.headline.italic}</span><br/>
          ${K.hero.headline.tail}
        </h1>
        <p class="hero-subhead reveal r-d2">${K.hero.subhead}</p>
        <div class="cta-row reveal r-d3">
          <a class="btn btn-primary" href="#lead">${K.hero.cta} ${KP.arrow()}</a>
          <a class="btn btn-secondary" href="#offer">See what's included</a>
        </div>
      </div>
    </section>

    <!-- Photo strip -->
    <div class="container">
      <div class="photo-strip">
        <div class="ph ph-photo reveal"><div class="ph-tag">PHOTO \u00b7 KAZOO CLASS</div><span>Little ones in class</span></div>
        <div class="ph ph-video reveal r-d1"><div class="ph-tag">VIDEO \u00b7 OPEN PLAY</div><div class="ph-play"><svg width="20" height="20" viewBox="0 0 20 20"><path d="M6 4l10 6-10 6z" fill="currentColor"/></svg></div></div>
        <div class="ph ph-photo reveal r-d2"><div class="ph-tag">PHOTO \u00b7 PARENT + CHILD</div><span>Open Play moment</span></div>
      </div>
    </div>

    <!-- PULL QUOTE -->
    ${KP.pullquote(K.pullQuote)}

    <!-- HOW IT WORKS -->
    <section class="four-col-strip">
      <div class="container">
        <h2 class="fc-head reveal">${K.howItWorks.heading.pre} <em>${K.howItWorks.heading.italic}</em></h2>
        <div class="four-col-grid" style="grid-template-columns: repeat(3, 1fr);">
          ${K.howItWorks.items.map((it, i) => `
            <div class="four-col-item reveal r-d${i+1}">
              <div class="num">${['i','ii','iii'][i]}</div>
              <h3>${it.title}</h3>
              <p>${it.body}</p>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- WHY IT WORKS -->
    <div class="container">
      <section class="two-col reveal">
        <h2>They're <span class="italic">playing</span> \u2014<br/>and <span class="italic">growing</span> \u2014<br/>at the same time.</h2>
        <div class="two-col-body">
          ${K.whyItWorks.body.map(p => `<p>${p}</p>`).join('')}
        </div>
      </section>
    </div>

    <!-- OPEN PLAY HIGHLIGHT -->
    <div class="container" style="padding: 40px 0 80px;">
      <div class="feature-grid-2">
        <div class="ph ph-square reveal">
          <div class="ph-tag">PHOTO \u00b7 OPEN PLAY</div>
          <span>Instruments \u00b7 costumes \u00b7 puppets</span>
        </div>
        <div class="feature-card reveal r-d1">
          <div class="fc-eye">\u2726 Add-on experience</div>
          <h3>${K.openPlay.heading.pre} <em>${K.openPlay.heading.italic}</em></h3>
          <p>${K.openPlay.body}</p>
          <div style="margin-top: 28px;">
            <a class="btn btn-primary" href="#lead">Ask about Open Play ${KP.arrow()}</a>
          </div>
        </div>
      </div>
    </div>

    <!-- ENROLL OFFER -->
    <section id="offer" class="container">
      <div class="enroll-offer">
        <div class="reveal">
          <div class="price">Monthly</div>
          <div class="price-big">${K.enroll.priceBig}<span style="font-size:32px; color: rgba(244,233,210,.6);">${K.enroll.priceUnit}</span></div>
          <h2>${K.enroll.heading.pre}<br/><em>${K.enroll.heading.italic}</em></h2>
        </div>
        <div class="reveal r-d1">
          <ul class="includes">
            ${K.enroll.includes.map(inc => `<li>${inc}</li>`).join('')}
          </ul>
          <a class="btn btn-primary" href="#lead" style="width:100%; justify-content:center;">${K.enroll.cta} ${KP.arrow()}</a>
        </div>
      </div>
    </section>

    <!-- TESTIMONIALS -->
    ${KP.testimonials(K.testimonials, { pre: 'What', italic: 'Kazoo', tail: 'families say.' })}

    <!-- LEAD FORM -->
    <section id="lead" class="lead-section container">
      <div class="reveal">
        <div class="ls-eye">\u2726 Find your class</div>
        <h2>${K.leadForm.heading.pre}<br/><em>${K.leadForm.heading.italic}</em></h2>
        <p>${K.leadForm.sub}</p>
        ${KP.iClassEmbed('Kazoo')}
      </div>
      <div class="reveal r-d1">${KP.leadForm(K.leadForm)}</div>
    </section>

    <!-- FINAL -->
    ${KP.finalCta({
      eye: 'RSVP',
      heading: { pre: "You're", italic: 'invited.' },
      body: "Come see what an invitation feels like. No audition required. No obligation. Just a conversation and a look around.",
      primary: 'Enroll today',
      secondary: 'Schedule a tour',
    })}
  `;
  if (window.__observeReveal) window.__observeReveal();
</script>
</body>
</html>
