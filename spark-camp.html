<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spark Camp — One-week summer performing arts camp (K–6th) | Kaleo Arts</title>
<meta name="description" content="A one-week summer camp for K–6th grade. Music, dance, drama, and art — ending in a full musical theater production." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/kaleo.css" />
</head>
<body data-screen-label="Spark Camp">
<div id="lights-slot"></div>
<div id="nav-slot"></div>

<main id="app"></main>

<div id="footer-slot"></div>

<script>window.__page = 'spark-camp';</script>
<script src="assets/copy.js"></script>
<script src="assets/kaleo.js"></script>
<script src="assets/chrome.js"></script>
<script src="assets/partials.js"></script>
<script>
  const C = window.KALEO_COPY;
  const KP = window.KP;
  const K = C.sparkCamp;
  const app = document.getElementById('app');

  app.innerHTML = `
    <!-- HERO -->
    <section class="hero program-hero cranberry">
      <div class="spotlight"></div>
      <div class="container hero-inner">
        <span class="accent-line"></span>
        <div class="eyebrow reveal">${K.hero.eyebrow}</div>
        <h1 class="hero-title reveal r-d1">
          ${K.hero.headline.pre}
          <span class="italic">${K.hero.headline.italic}</span>
          ${K.hero.headline.tail}
        </h1>
        <p class="hero-subhead reveal r-d2">${K.hero.subhead}</p>
        <div class="cta-row reveal r-d3">
          <a class="btn btn-primary" href="#lead">${K.hero.cta} ${KP.arrow()}</a>
          <a class="btn btn-secondary" href="#week">See the week</a>
        </div>
      </div>
    </section>

    <!-- Photo strip -->
    <div class="container">
      <div class="photo-strip">
        <div class="ph ph-photo reveal"><div class="ph-tag">PHOTO \u00b7 CAMPERS DANCING</div><span>Day 2 of Spark Camp</span></div>
        <div class="ph ph-video reveal r-d1"><div class="ph-tag">VIDEO \u00b7 SHOWTIME</div><div class="ph-play"><svg width="20" height="20" viewBox="0 0 20 20"><path d="M6 4l10 6-10 6z" fill="currentColor"/></svg></div></div>
        <div class="ph ph-photo reveal r-d2"><div class="ph-tag">PHOTO \u00b7 FINAL SHOW</div><span>Musical theater production</span></div>
      </div>
    </div>

    <!-- WEEK STRUCTURE -->
    <section id="week" class="four-col-strip">
      <div class="container">
        <h2 class="fc-head reveal">${K.week.heading.pre} <em>${K.week.heading.italic}</em></h2>
        <p class="fc-sub reveal r-d1">${K.week.sub}</p>
        <div class="four-col-grid five-col">
          ${K.week.days.map((d, i) => `
            <div class="four-col-item reveal r-d${(i%4)+1}">
              <div class="num">${d.day}</div>
              <h3>${d.title}</h3>
              <p>${d.body}</p>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- COMMUNITY TIME -->
    <div class="container">
      <section class="two-col reveal">
        <h2>${K.communityTime.heading.pre}<br/><span class="italic">${K.communityTime.heading.italic}</span></h2>
        <div class="two-col-body">
          ${K.communityTime.body.map(p => `<p>${p}</p>`).join('')}
        </div>
      </section>
    </div>

    <!-- STAFF -->
    <div class="container" style="padding: 40px 0 80px;">
      <div class="feature-grid-2">
        <div class="ph ph-square reveal">
          <div class="ph-tag">PHOTO \u00b7 STAFF + VOLUNTEERS</div>
          <span>Spark Camp team on final day</span>
        </div>
        <div class="feature-card reveal r-d1">
          <div class="fc-eye">\u2726 Who runs the week</div>
          <h3>${K.staff.heading.pre} <em>${K.staff.heading.italic}</em></h3>
          <p>${K.staff.body}</p>
          <div style="margin-top: 28px;">
            <a class="btn btn-primary" href="#lead">Save my camper's spot ${KP.arrow()}</a>
          </div>
        </div>
      </div>
    </div>

    <!-- LEAD FORM -->
    <section id="lead" class="lead-section container">
      <div class="reveal">
        <div class="ls-eye">\u2726 This summer's dates</div>
        <h2>${K.leadForm.heading.pre}<br/><em>${K.leadForm.heading.italic}</em></h2>
        <p>${K.leadForm.sub}</p>
        ${KP.iClassEmbed('Spark Camp')}
      </div>
      <div class="reveal r-d1">${KP.leadForm(K.leadForm)}</div>
    </section>

    <!-- FINAL -->
    ${KP.finalCta({
      eye: 'RSVP',
      heading: { pre: "You're", italic: 'invited.' },
      body: "Come see what an invitation feels like. No audition required. No obligation. Just a conversation and a look around.",
      primary: 'Enroll today',
      secondary: 'Schedule a tour',
    })}
  `;
  if (window.__observeReveal) window.__observeReveal();
</script>
</body>
</html>
